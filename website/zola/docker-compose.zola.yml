services:
  # zola
  zola:
    image: ghcr.io/getzola/zola:v0.22.1
    container_name: zola
    extends:
      file: ../common.yml
      service: service-base
    profiles:
      - zola
      - zola-dev
    env_file:
      - ./env/zola.env
    working_dir: /project
    command: ["serve", "--force", "--interface", "0.0.0.0", "--port", "80", "--base-url", "http://0.0.0.0", "--output-dir", "/tmpfs/public"]
    ports:
      - "80:80"
      - "1024:1024"
    volumes:
      - ./../site:/project
      - public_www:/tmpfs/public:rw
    networks:
      - infra-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.001'
          memory: 20M
  zola-build:
    image: ghcr.io/getzola/zola:v0.22.1
    container_name: zola-build
    extends:
      file: ../common.yml
      service: service-base
    profiles:
      - zola-build
    env_file:
      - ./env/zola.env
    working_dir: /project
    command: ["build", "--force", "--base-url", "https://bensuperpc.github.io", "--output-dir", "/site/public"]
    volumes:
      - ./../site:/project
      - ./../build:/site:rw
    networks:
      - infra-network

volumes:
  public_www:
    name: public_www
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1g,uid=${PUID:-1000},gid=${PGID:-1000}
